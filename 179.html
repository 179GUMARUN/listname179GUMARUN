<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>179</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
    --bg:#0b0b0b;
    --header:#111;
    --white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Sarabun',sans-serif;}

body{
    background:var(--bg);
    color:var(--white);
}

/* ===== Splash ===== */
#splash{
    position:fixed;
    inset:0;
    z-index:9999;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.5s;
}

#splash.fade-out{
    opacity:0;
    pointer-events:none; /* 🔥 แก้กดไม่ได้ */
}

.splash-logo{
    width:150px;
}

/* ===== Header ===== */
header{
    background:var(--header);
    padding:18px;
    text-align:center;
}

/* ===== TS3 Button ===== */
.ts3-wrap{
    text-align:center;
    margin:25px 0;
}

.ts3Btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:14px 26px;
    font-size:16px;
    font-weight:800;
    border-radius:999px;
    text-decoration:none;
    background:#fff;
    color:#000;
    transition:0.25s;
}

.ts3Btn:hover{
    transform:scale(1.05);
}

/* ===== Layout ===== */
.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#111;
    padding:15px;
    border-radius:15px;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.name{font-weight:bold;margin-top:10px;}
.role{color:#aaa;font-size:14px;margin-bottom:10px;}

.fbBtn{
    display:block;
    text-align:center;
    padding:10px;
    border-radius:999px;
    background:#222;
    color:#fff;
    text-decoration:none;
}

.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:rgba(0,0,0,0.9);
    color:#fff;
    padding:12px 20px;
    border-radius:12px;
    font-weight:600;
    opacity:0;
    pointer-events:none;
    transition:all .3s ease;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
}

/* pagination */
.pagination{
    margin-top:20px;
    text-align:center;
}

.pageBtn{
    margin:5px;
    padding:8px 12px;
    background:#111;
    border:1px solid #333;
    color:#fff;
    cursor:pointer;
}

.pageBtn.active{
    background:#fff;
    color:#000;
}
</style>
</head>

<body>


<div id="toast" class="toast">คัดลอกแล้ว</div>
<!-- Splash -->
<div id="splash">
    <img src="https://img2.pic.in.th/1aea5abb6c06b72e1.png" class="splash-logo">
</div>

<header>
    <h1>179</h1>
</header>

<!-- ปุ่ม TS3 -->
<button class="ts3Btn" onclick="copyTS3()">
    <i class="fas fa-copy"></i> คัดลอก IP TS3
</button>

<script>
function copyTS3(){
    const text = "179Gmr";

    navigator.clipboard.writeText(text).catch(()=>{
        const input = document.createElement("input");
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        document.removeChild(input);
    });

    const toast = document.getElementById("toast");
    toast.innerText = "คัดลอกแล้ว: " + text;

    toast.classList.add("show");

    setTimeout(()=>{
        toast.classList.remove("show");
    },2000);
}
</script>
<div class="container">

<h2>Founders</h2>
<div id="founder" class="grid"></div>
<div id="pagFounder" class="pagination"></div>

<h2>Members</h2>
<div id="member" class="grid"></div>
<div id="pagMember" class="pagination"></div>

</div>

<script>
/* 🔥 Splash แก้กดไม่ได้ */
setTimeout(()=>{
    const splash = document.getElementById("splash");
    splash.classList.add("fade-out");

    setTimeout(()=>{
        splash.remove(); // 🔥 เอาออกจริงๆ
    },500);

},2000);

const allMembers = [
  {name:'Zeno Gumarun',role:'Founder',img:'https://i.postimg.cc/sXC5TDNS/281010419-111440861565383-1295873477742202255-n.jpg',fb:'https://www.facebook.com/'},
  {name:'BungJoke Lonthangkhana',role:'Founder',img:'https://i.postimg.cc/1RY9PF3Z/482010978-517799924738250-5608356900494938275-n.png',fb:'https://www.facebook.com/bang.c.kh.ku.ma.ran'},
  {name:'Mind Gumarun',role:'Founder',img:'https://i.postimg.cc/Bb8tsBWZ/476345984-546276861798001-2605718371620205500-n.png',fb:'https://www.facebook.com/anakin.Rhnk'},
  {name:'Kapo Gumarun',role:'Member',img:'https://i.postimg.cc/gcgmHTXr/481893759-122271886346001818-7950197713354393065-n.png',fb:'https://www.facebook.com/kapo.gumarun'},
  {name:'Nayx Lonthangkhana',role:'Member',img:'https://i.postimg.cc/gj5GGx88/468977811-122188227656241663-5795268461173550526-n.png',fb:'https://www.facebook.com/profile.php?id=61557249911802'},
  {name:'Witta Rakkaimaipen',role:'Member',img:'https://i.postimg.cc/k4dKw5Hf/483918166-122202900782188960-1045919471961663067-n.png',fb:'https://www.facebook.com/profile.php?id=61555668812380'},
  {name:'Ryan Gumarun',role:'Member',img:'https://i.postimg.cc/CLz23F7J/553179905-2871262436396827-8916579718733061737-n.jpg',fb:'https://www.facebook.com/profile.php?id=61581903673434'},
  {name:'Shimo Gumarun',role:'Member',img:'https://i.postimg.cc/fTfqX1kp/image.png',fb:'https://www.facebook.com/profile.php?id=61573758217528'},
  {name:'Hades Gumarun',role:'Member',img:'https://i.postimg.cc/j5cz3bPz/440383557-122102417222310243-6728030251805127040-n.png',fb:'https://www.facebook.com/profile.php?id=61558092953455'}
];

const PER_PAGE = 4;

function render(role, boxId, pagId){
    const box = document.getElementById(boxId);
    const pag = document.getElementById(pagId);

    const data = allMembers.filter(x=>x.role===role);
    const total = Math.ceil(data.length / PER_PAGE);

    let page = window["p_"+role] || 1;

    const start = (page-1)*PER_PAGE;
    const list = data.slice(start,start+PER_PAGE);

    box.innerHTML = list.map(x=>`
        <div class="card">
            <img src="${x.img}">
            <div class="name">${x.name}</div>
            <div class="role">${x.role}</div>
            <a href="${x.fb}" target="_blank" class="fbBtn">Facebook</a>
        </div>
    `).join("");

    pag.innerHTML="";
    for(let i=1;i<=total;i++){
        pag.innerHTML += `<button class="pageBtn ${i===page?'active':''}" onclick="go('${role}',${i})">${i}</button>`;
    }
}

function go(role,p){
    window["p_"+role]=p;
    renderAll();
}

function renderAll(){
    render("Founder","founder","pagFounder");
    render("Member","member","pagMember");
}

renderAll();
</script>

</body>
</html>
